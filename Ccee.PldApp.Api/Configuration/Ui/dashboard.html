<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de PLD - CCEE Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #FF9800 0%, #FF6F00 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn.cache {
            background: #4CAF50;
            color: white;
        }

        .icon-btn.cache:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .logout-btn {
            height: 40px;
            padding: 0 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #c62828;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
            background: #333;
            padding: 20px;
            border-radius: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #333;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #FF9800;
        }

        .info-card h3 {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .info-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-cache {
            background: #1b5e20;
            color: #81c784;
        }

        .badge-ccee {
            background: #0d47a1;
            color: #64b5f6;
        }

        .error {
            background: #c62828;
            color: #ffcdd2;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #b71c1c;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #FF9800;
        }

        .spinner {
            border: 3px solid #444;
            border-top: 3px solid #FF9800;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 20px;
            }

            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard de PLD</h1>
            <p>Consulta de valores horarios com cache local</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="form-group">
                    <label for="dataInput">Data (YYYY-MM-DD)</label>
                    <input type="date" id="dataInput" />
                </div>

                <div class="form-group">
                    <label for="submercadoSelect">Submercado</label>
                    <select id="submercadoSelect">
                        <option value="SUDESTE">SUDESTE</option>
                        <option value="SUL">SUL</option>
                        <option value="NORDESTE">NORDESTE</option>
                        <option value="NORTE">NORTE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="limitInput">Limite de Registros</label>
                    <input type="number" id="limitInput" value="1000" min="1" max="10000" />
                </div>

                <div class="button-group">
                    <button class="icon-btn cache" id="carregarBtn" type="button" title="Carregar dados">↓</button>
                    <button class="logout-btn" id="logoutBtn" type="button">Sair</button>
                </div>
            </div>

            <div id="errorDiv"></div>

            <div id="chartSection" style="display: none;">
                <div class="info-grid">
                    <div class="info-card">
                        <h3>Media do Dia</h3>
                        <div class="value" id="averageValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>Submercado</h3>
                        <div class="value" id="submercadoValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>PLD Atual</h3>
                        <div class="value" id="currentValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>Origem dos Dados</h3>
                        <div id="sourceValue"></div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="pldChart"></canvas>
                </div>
            </div>

            <div id="loadingDiv" style="display: none;">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando dados...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart = null;

        document.getElementById("carregarBtn").addEventListener("click", loadChart);
        document.getElementById("logoutBtn").addEventListener("click", logout);

        document.getElementById("dataInput").valueAsDate = new Date();

        ensureAuthenticated();

        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };

            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        async function ensureAuthenticated() {
            try {
                const response = await fetch("/api/auth/me");
                if (!response.ok) {
                    window.location.href = "/login";
                    return;
                }
            } catch {
                window.location.href = "/login";
                return;
            }

            await loadChart();
        }

        async function logout() {
            try {
                await fetch("/api/auth/logout", { method: "POST" });
            } finally {
                window.location.href = "/login";
            }
        }

        async function loadChart() {
            const data = document.getElementById("dataInput").value;
            const submercado = document.getElementById("submercadoSelect").value;
            const limit = document.getElementById("limitInput").value || 1000;

            document.getElementById("errorDiv").innerHTML = "";
            document.getElementById("chartSection").style.display = "none";
            document.getElementById("loadingDiv").style.display = "block";

            try {
                let url = `/api/pld?limit=${encodeURIComponent(limit)}`;
                if (data) url += `&date=${encodeURIComponent(data)}`;
                if (submercado) url += `&submercado=${encodeURIComponent(submercado)}`;

                const response = await fetch(url);
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = "/login";
                        return;
                    }

                    let message = "Erro ao carregar dados.";
                    try {
                        const errorBody = await response.json();
                        message = errorBody.detail || errorBody.message || message;
                    } catch {
                        // ignore json parse errors
                    }

                    throw new Error(message);
                }

                const pldResult = await response.json();
                const chartData = formatChartData(pldResult);
                renderChart(chartData);
                displayInfo(chartData);

                document.getElementById("chartSection").style.display = "block";
                document.getElementById("loadingDiv").style.display = "none";
            } catch (error) {
                const safeMessage = escapeHtml(error instanceof Error ? error.message : "Erro inesperado.");
                document.getElementById("errorDiv").innerHTML = `<div class="error"><strong>Erro:</strong> ${safeMessage}</div>`;
                document.getElementById("loadingDiv").style.display = "none";
            }
        }

        function formatChartData(pldResult) {
            const sortedRecords = [...pldResult.records].sort((a, b) => a.hora - b.hora);
            const labels = sortedRecords.map(r => `H${String(r.hora).padStart(2, "0")}`);
            const values = sortedRecords.map(r => {
                const parsed = parseFloat(r.valor);
                return Number.isNaN(parsed) ? 0 : parsed;
            });

            const average = values.length > 0
                ? Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 100) / 100
                : 0;

            const today = new Date().toISOString().split("T")[0];
            let currentHourIndex = -1;
            const dataConsultada = pldResult.query.dia || today;

            if (dataConsultada === today) {
                const currentHour = new Date().getHours();
                currentHourIndex = sortedRecords.findIndex(r => r.hora === currentHour || r.hora === currentHour + 1);
            }

            return {
                labels,
                values,
                average,
                currentHourIndex,
                source: pldResult.source,
                submercado: pldResult.query.submercado,
                dia: pldResult.query.dia
            };
        }

        function renderChart(data) {
            const ctx = document.getElementById("pldChart").getContext("2d");
            const bgColors = data.values.map((_, index) => index === data.currentHourIndex ? "#ff6b6b" : "#FF9800");
            const borderColors = bgColors.map((color, index) => index === data.currentHourIndex ? "#c92a2a" : "#FF6F00");

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: "PLD Horario (R$/MWh)",
                            data: data.values,
                            backgroundColor: bgColors,
                            borderColor: borderColors,
                            borderWidth: 2,
                            borderRadius: 4,
                            yAxisID: "y"
                        },
                        {
                            label: `Media: ${data.average} R$/MWh`,
                            type: "line",
                            data: Array(data.values.length).fill(data.average),
                            borderColor: "#FFD700",
                            borderWidth: 3,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0,
                            yAxisID: "y"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: "top" },
                        title: {
                            display: true,
                            text: `PLD ${data.dia ? `de ${data.dia}` : "ultimas horas"} - ${data.submercado || "Todos os submercados"}`,
                            font: { size: 16, weight: "bold" }
                        }
                    },
                    scales: {
                        y: {
                            type: "linear",
                            display: true,
                            title: {
                                display: true,
                                text: "Preco (R$/MWh)"
                            }
                        }
                    }
                }
            });
        }

        function displayInfo(data) {
            document.getElementById("averageValue").textContent = `R$ ${data.average.toFixed(2)}`;
            document.getElementById("submercadoValue").textContent = data.submercado || "-";

            const badge = document.createElement("span");
            const sourceValue = String(data.source || "Cache");
            const normalizedSource = sourceValue.toLowerCase();
            badge.className = `badge badge-${normalizedSource === "ccee" ? "ccee" : "cache"}`;
            badge.textContent = normalizedSource === "ccee" ? "API CCEE" : "Cache Local";

            const sourceHost = document.getElementById("sourceValue");
            sourceHost.innerHTML = "";
            sourceHost.appendChild(badge);

            if (data.currentHourIndex !== -1) {
                const currentValue = data.values[data.currentHourIndex];
                document.getElementById("currentValue").textContent = `R$ ${currentValue.toFixed(2)}`;
            } else {
                document.getElementById("currentValue").textContent = "-";
            }
        }
    </script>
</body>
</html>
