<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de PLD - CCEE Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #040917;
            --bg-layer: #09142f;
            --panel: #0f1c3f;
            --panel-strong: #152652;
            --text-main: #edf4ff;
            --text-soft: #97acd5;
            --accent-blue: #4c8eff;
            --accent-cyan: #2dd4f6;
            --accent-purple: #a855f7;
            --danger: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI Variable Display", "Bahnschrift", "Candara", sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            background:
                radial-gradient(circle at 12% 14%, rgba(41, 92, 255, 0.28) 0%, transparent 40%),
                radial-gradient(circle at 90% 5%, rgba(45, 212, 246, 0.18) 0%, transparent 35%),
                linear-gradient(180deg, #040917 0%, #071233 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(180deg, rgba(15, 28, 63, 0.92) 0%, rgba(9, 20, 47, 0.96) 100%);
            border: 1px solid rgba(84, 130, 255, 0.26);
            border-radius: 14px;
            box-shadow: 0 28px 64px rgba(1, 6, 22, 0.68);
            overflow: hidden;
            animation: rise-in 420ms ease-out both;
        }

        header {
            background: linear-gradient(135deg, #0b2d76 0%, #194ab4 45%, #2e77ff 100%);
            color: #f8fbff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(124, 170, 255, 0.4);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 6px;
            letter-spacing: 0.4px;
        }

        header p {
            font-size: 14px;
            color: #d4e4ff;
            opacity: 0.95;
        }

        .content {
            padding: 30px 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #bfd2f6;
            font-size: 13px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid rgba(108, 148, 255, 0.35);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: #0a1634;
            color: var(--text-main);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(45, 212, 246, 0.14);
        }

        .button-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn.cache {
            background: linear-gradient(135deg, #2dd4f6 0%, #2f7cff 100%);
            color: #f8fbff;
            box-shadow: 0 10px 22px rgba(44, 129, 255, 0.34);
        }

        .icon-btn.cache:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 14px 26px rgba(44, 129, 255, 0.44);
        }

        .logout-btn {
            height: 42px;
            padding: 0 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #d9485f 0%, #9f1239 100%);
            color: white;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(217, 72, 95, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
            background: linear-gradient(180deg, rgba(6, 18, 44, 0.86) 0%, rgba(9, 25, 62, 0.95) 100%);
            border: 1px solid rgba(93, 134, 242, 0.24);
            padding: 20px;
            border-radius: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: linear-gradient(180deg, rgba(20, 38, 82, 0.92) 0%, rgba(15, 28, 63, 0.92) 100%);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
            border: 1px solid rgba(110, 148, 248, 0.2);
            animation: rise-in 420ms ease-out both;
        }

        .info-card h3 {
            font-size: 11px;
            color: #8ca4d4;
            letter-spacing: 0.45px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .info-card .value {
            font-size: 22px;
            font-weight: 700;
            color: #f2f7ff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-cache {
            background: rgba(34, 197, 94, 0.16);
            color: #7df7b2;
            border: 1px solid rgba(34, 197, 94, 0.35);
        }

        .badge-ccee {
            background: rgba(45, 212, 246, 0.16);
            color: #a6eeff;
            border: 1px solid rgba(45, 212, 246, 0.36);
        }

        .badge-unknown {
            background: rgba(148, 163, 184, 0.16);
            color: #d9e5fb;
            border: 1px solid rgba(148, 163, 184, 0.34);
        }

        .error {
            background: rgba(127, 29, 29, 0.65);
            color: #ffe0e0;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(248, 113, 113, 0.6);
        }

        .warning {
            background: rgba(120, 53, 15, 0.45);
            color: #ffe9c9;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(251, 191, 36, 0.62);
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #89ddff;
        }

        .spinner {
            border: 3px solid rgba(82, 114, 184, 0.4);
            border-top: 3px solid var(--accent-cyan);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 21px;
            }

            .content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard de PLD</h1>
            <p>Consulta de valores horarios com cache local</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="form-group">
                    <label for="dataInput">Data</label>
                    <input type="date" id="dataInput" />
                </div>

                <div class="form-group">
                    <label for="submercadoSelect">Submercado</label>
                    <select id="submercadoSelect">
                        <option value="SUDESTE">SUDESTE</option>
                        <option value="SUL">SUL</option>
                        <option value="NORDESTE">NORDESTE</option>
                        <option value="NORTE">NORTE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="limitInput">Limite de Registros</label>
                    <input type="number" id="limitInput" value="1000" min="1" max="10000" />
                </div>

                <div class="button-group">
                    <button class="icon-btn cache" id="carregarBtn" type="button" title="Carregar dados">↓</button>
                    <button class="logout-btn" id="logoutBtn" type="button">Sair</button>
                </div>
            </div>

            <div id="errorDiv"></div>

            <div id="chartSection" style="display: none;">
                <div class="info-grid">
                    <div class="info-card">
                        <h3>Media do Dia</h3>
                        <div class="value" id="averageValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>Submercado</h3>
                        <div class="value" id="submercadoValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>PLD Atual</h3>
                        <div class="value" id="currentValue">-</div>
                    </div>
                    <div class="info-card">
                        <h3>Origem dos Dados</h3>
                        <div id="sourceValue"></div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="pldChart"></canvas>
                </div>
            </div>

            <div id="loadingDiv" style="display: none;">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando dados...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart = null;

        document.getElementById("carregarBtn").addEventListener("click", loadChart);
        document.getElementById("logoutBtn").addEventListener("click", logout);

        document.getElementById("dataInput").valueAsDate = new Date();

        ensureAuthenticated();

        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };

            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        async function ensureAuthenticated() {
            try {
                const response = await fetch("/api/auth/me");
                if (!response.ok) {
                    window.location.href = "/login";
                    return;
                }
            } catch {
                window.location.href = "/login";
                return;
            }

            await loadChart();
        }

        async function logout() {
            try {
                await fetch("/api/auth/logout", { method: "POST" });
            } finally {
                window.location.href = "/login";
            }
        }

        async function loadChart() {
            const data = document.getElementById("dataInput").value;
            const submercado = document.getElementById("submercadoSelect").value;
            const limit = document.getElementById("limitInput").value || 1000;

            document.getElementById("errorDiv").innerHTML = "";
            document.getElementById("chartSection").style.display = "none";
            document.getElementById("loadingDiv").style.display = "block";

            try {
                let url = `/api/pld?limit=${encodeURIComponent(limit)}`;
                if (data) url += `&date=${encodeURIComponent(data)}`;
                if (submercado) url += `&submercado=${encodeURIComponent(submercado)}`;

                const response = await fetch(url);
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = "/login";
                        return;
                    }

                    let errorBody = null;
                    try {
                        errorBody = await response.json();
                    } catch {
                        // ignore json parse errors
                    }

                    if (response.status === 404) {
                        const warningMessage = buildNoDataWarningMessage(data, submercado, errorBody);
                        const safeWarningMessage = escapeHtml(warningMessage);
                        document.getElementById("errorDiv").innerHTML = `<div class="warning"><strong>Aviso:</strong> ${safeWarningMessage}</div>`;
                        document.getElementById("loadingDiv").style.display = "none";
                        return;
                    }

                    const message = errorBody?.detail || errorBody?.message || "Erro ao carregar dados.";
                    throw new Error(message);
                }

                const pldResult = await response.json();
                const chartData = formatChartData(pldResult);
                renderChart(chartData);
                displayInfo(chartData);

                document.getElementById("chartSection").style.display = "block";
                document.getElementById("loadingDiv").style.display = "none";
            } catch (error) {
                const safeMessage = escapeHtml(error instanceof Error ? error.message : "Erro inesperado.");
                document.getElementById("errorDiv").innerHTML = `<div class="error"><strong>Erro:</strong> ${safeMessage}</div>`;
                document.getElementById("loadingDiv").style.display = "none";
            }
        }

        function formatChartData(pldResult) {
            const sortedRecords = [...pldResult.records].sort((a, b) => a.hora - b.hora);
            const labels = sortedRecords.map(r => `H${String(r.hora).padStart(2, "0")}`);
            const values = sortedRecords.map(r => {
                const parsed = parseFloat(r.valor);
                return Number.isNaN(parsed) ? 0 : parsed;
            });

            const average = values.length > 0
                ? Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 100) / 100
                : 0;

            const today = new Date().toISOString().split("T")[0];
            let currentHourIndex = -1;
            const dataConsultada = pldResult.query.dia || today;

            if (dataConsultada === today) {
                const currentHour = new Date().getHours();
                currentHourIndex = sortedRecords.findIndex(r => r.hora === currentHour || r.hora === currentHour + 1);
            }

            return {
                labels,
                values,
                average,
                currentHourIndex,
                sourceKind: normalizeSource(pldResult.source),
                sourceRaw: pldResult.source,
                submercado: pldResult.query.submercado,
                diaLabel: formatDateForDisplay(pldResult.query.dia)
            };
        }

        function normalizeSource(source) {
            if (source === null || source === undefined) return "unknown";

            if (typeof source === "number") {
                if (source === 2) return "ccee";
                if (source === 1) return "cache";
                return "unknown";
            }

            const normalizedSource = String(source).trim().toLowerCase();
            if (normalizedSource === "2" || normalizedSource === "ccee") return "ccee";
            if (normalizedSource === "1" || normalizedSource === "cache") return "cache";
            return "unknown";
        }

        function formatDateForDisplay(rawDate) {
            if (!rawDate) return null;

            const value = String(rawDate).trim();
            const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
            if (match) {
                return `${match[3]}/${match[2]}/${match[1]}`;
            }

            return value;
        }

        function buildNoDataWarningMessage(rawDate, submercado, errorBody) {
            let dateLabel = formatDateForDisplay(rawDate);

            if (!dateLabel && errorBody && typeof errorBody.detail === "string") {
                const match = /Dia:\s*(\d{4}-\d{2}-\d{2})/i.exec(errorBody.detail);
                if (match) {
                    dateLabel = formatDateForDisplay(match[1]);
                }
            }

            const resolvedDate = dateLabel || "mais recente";
            const resolvedSubmercado = submercado || "todos";

            return `Nao foram retornados dados da CCEE e nao ha registros no cache local para a consulta. Dia: ${resolvedDate}. Submercado: ${resolvedSubmercado}.`;
        }

        function renderChart(data) {
            const ctx = document.getElementById("pldChart").getContext("2d");
            const colorRange = Math.max(data.values.length - 1, 1);
            const bgColors = data.values.map((_, index) => {
                if (index === data.currentHourIndex) {
                    return "rgba(168, 85, 247, 0.92)";
                }

                const hue = 212 - Math.round((index / colorRange) * 20);
                return `hsla(${hue}, 88%, 57%, 0.88)`;
            });
            const borderColors = data.values.map((_, index) => {
                if (index === data.currentHourIndex) {
                    return "rgba(126, 34, 206, 1)";
                }

                const hue = 213 - Math.round((index / colorRange) * 16);
                return `hsla(${hue}, 91%, 68%, 1)`;
            });

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: "PLD Horario (R$/MWh)",
                            data: data.values,
                            backgroundColor: bgColors,
                            borderColor: borderColors,
                            borderWidth: 2,
                            borderRadius: 4,
                            yAxisID: "y"
                        },
                        {
                            label: `Media: ${data.average} R$/MWh`,
                            type: "line",
                            data: Array(data.values.length).fill(data.average),
                            borderColor: "#7dd3fc",
                            borderWidth: 3,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0,
                            yAxisID: "y"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: "top",
                            labels: {
                                color: "#dbeafe"
                            }
                        },
                        title: {
                            display: true,
                            text: `PLD ${data.diaLabel ? `de ${data.diaLabel}` : "ultimas horas"} - ${data.submercado || "Todos os submercados"}`,
                            color: "#dbeafe",
                            font: { size: 16, weight: "bold" }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: "rgba(113, 152, 255, 0.14)"
                            },
                            ticks: {
                                color: "#c8dbff"
                            }
                        },
                        y: {
                            type: "linear",
                            display: true,
                            grid: {
                                color: "rgba(113, 152, 255, 0.17)"
                            },
                            ticks: {
                                color: "#c8dbff"
                            },
                            title: {
                                display: true,
                                text: "Preco (R$/MWh)",
                                color: "#dbeafe"
                            }
                        }
                    }
                }
            });
        }

        function displayInfo(data) {
            document.getElementById("averageValue").textContent = `R$ ${data.average.toFixed(2)}`;
            document.getElementById("submercadoValue").textContent = data.submercado || "-";
            const currentValueElement = document.getElementById("currentValue");

            const badge = document.createElement("span");
            const sourceKind = data.sourceKind;
            badge.className = `badge badge-${sourceKind}`;

            if (sourceKind === "ccee") {
                badge.textContent = "API CCEE";
            } else if (sourceKind === "cache") {
                badge.textContent = "Cache Local";
            } else {
                badge.textContent = `Origem desconhecida (${String(data.sourceRaw ?? "-")})`;
            }

            const sourceHost = document.getElementById("sourceValue");
            sourceHost.innerHTML = "";
            sourceHost.appendChild(badge);

            if (data.currentHourIndex !== -1) {
                const currentValue = data.values[data.currentHourIndex];
                currentValueElement.textContent = `R$ ${currentValue.toFixed(2)}`;
                currentValueElement.style.color = "#c4b5fd";
            } else {
                currentValueElement.textContent = "-";
                currentValueElement.style.color = "#f2f7ff";
            }
        }
    </script>
</body>
</html>
