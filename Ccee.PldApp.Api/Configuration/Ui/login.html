<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CCEE PLD Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #FF9800 0%, #FF6F00 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-form {
            padding: 40px 20px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            background-color: #333;
            color: #ffffff;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FF9800 0%, #FF6F00 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #c62828;
            color: #ffcdd2;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #b71c1c;
            font-size: 14px;
            display: none;
        }

        .info {
            background: #1565c0;
            color: #bbdefb;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            color: #FF9800;
        }

        .spinner {
            border: 3px solid #444;
            border-top: 3px solid #FF9800;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>CCEE PLD Gateway</h1>
            <p>Dashboard de PLD</p>
        </div>

        <div class="login-form">
            <div class="info">
                Credenciais padrao no arquivo de configuracao:<br>
                <code>Ccee.PldApp.Api/Configuration/SecurityConfig.json</code>
            </div>

            <div class="error" id="errorDiv"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Digite seu usuario"
                        required
                        autocomplete="username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Entrar
                </button>
            </form>

            <div class="loading" id="loadingDiv">
                <div class="spinner"></div>
                <p>Autenticando...</p>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const loginBtn = document.getElementById("loginBtn");
            const loadingDiv = document.getElementById("loadingDiv");
            const loginForm = document.getElementById("loginForm");

            hideError();

            if (!username || !password) {
                showError("Preencha usuario e senha.");
                return;
            }

            loginBtn.disabled = true;
            loginForm.style.display = "none";
            loadingDiv.style.display = "block";

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error("Usuario ou senha invalidos.");
                    }

                    let message = "Falha na autenticacao.";
                    try {
                        const body = await response.json();
                        if (body && typeof body.message === "string") {
                            message = body.message;
                        }
                    } catch {
                        // ignore json parse errors
                    }

                    throw new Error(message);
                }

                window.location.href = "/dashboard";
            } catch (error) {
                showError(error instanceof Error ? error.message : "Erro inesperado.");
                loginBtn.disabled = false;
                loginForm.style.display = "block";
                loadingDiv.style.display = "none";
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById("errorDiv");
            errorDiv.textContent = message;
            errorDiv.style.display = "block";
        }

        function hideError() {
            const errorDiv = document.getElementById("errorDiv");
            errorDiv.style.display = "none";
            errorDiv.textContent = "";
        }

        async function redirectIfAuthenticated() {
            try {
                const response = await fetch("/api/auth/me", { method: "GET" });
                if (response.ok) {
                    window.location.href = "/dashboard";
                }
            } catch {
                // ignore network errors on startup check
            }
        }

        redirectIfAuthenticated();
    </script>
</body>
</html>
